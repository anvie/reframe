[reframe]
name = "Git Init"
author = "reframe"
min_version = "0.5.6"
mode = "apply"

[project]
name = "git-setup"
version = "1.0"
finish_text = """
  Pre-commit hook installed. Run `git commit` to test it.
"""

[[post_generate]]
make_executable = "_hooks/pre-commit"
command = "cp _hooks/pre-commit .git/hooks/pre-commit"

[[param]]
author_name = { ask = "Your name?", default = "Developer" }

[[param]]
author_email = { ask = "Your email?", default = "dev@example.com" }
